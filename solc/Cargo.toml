[package]
name = "solc"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "solc"
path = "src/main.rs"

[dependencies]
solc-macros = { workspace = true }

serde = { version = "1", features = ["derive"] }
thiserror = "2"
miette = { version = "7", features = [
  "derive",
  "fancy",
  "serde",
], default-features = false }
clap = { version = "4", default-features = false, features = [
  "std",
  "derive",
  "help",
] }
wyhash2 = "0.2"
