[package]
name = "solc"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "solc"
path = "src/main.rs"

[dependencies]
solc-macros = { workspace = true }

clap = { version = "4.5.39", features = ["derive"] }
lazy_static = "1.5.0"
miette = { version = "7.6.0", features = ["fancy", "serde"] }
tempdir = "0.3.7"
thiserror = "2.0.12"
wyhash2 = "0.2.1"
serde = { version = "1.0.219", features = ["derive"] }

[dev-dependencies]
ron = "0.10.1"
