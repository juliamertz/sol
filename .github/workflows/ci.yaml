name: CI

on:
  push:
    branches: [main]

env: 
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Run checks
    runs-on: ubuntu-latest
    strategy:
      matrix:
        toolchain: ['nightly-2026-04-18']
    steps:
      - uses: actions/checkout@v4
      - run: rustup update ${{ matrix.toolchain }} && rustup default ${{ matrix.toolchain }}
      - run: cargo build
      - run: cargo test
